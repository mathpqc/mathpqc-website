<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MathPQC PDF Reader</title>
    <meta name="description" content="A static website that reads a PDF file from the repository and renders its text content on the page." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --border: #e2e8f0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }

      .hero, .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.06);
      }

      .hero {
        padding: 28px 30px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.9rem;
      }

      p {
        line-height: 1.7;
        color: var(--muted);
      }

      .controls {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover { opacity: 0.95; }

      .card {
        margin-top: 18px;
        padding: 22px 24px;
      }

      .page {
        border-top: 1px solid var(--border);
        padding-top: 18px;
        margin-top: 18px;
      }

      .page:first-of-type {
        border-top: none;
        padding-top: 0;
        margin-top: 0;
      }

      .page h3 {
        margin: 0 0 8px;
      }

      .page p {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .muted { color: var(--muted); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.min.js"></script>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>MathPQC PDF Reader</h1>
        <p>This page reads the PDF from the repository and renders its text content directly into the webpage.</p>
        <div class="controls">
          <button id="loadPdfBtn" type="button">Load PDF content</button>
          <span id="status" class="muted">Waiting to load…</span>
        </div>
      </section>

      <section class="card" id="documentContent">
        <p class="muted">No content loaded yet.</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

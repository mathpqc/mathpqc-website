<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MathPQC Website</title>
    <meta name="description" content="A simple static website for MathPQC documents hosted on GitHub Pages." />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
        color: var(--text);
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }

      .hero {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        line-height: 1.7;
        color: var(--muted);
      }

      .card {
        margin-top: 24px;
        background: white;
        border-radius: 16px;
        padding: 20px 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      ul {
        padding-left: 20px;
      }

      li {
        margin: 10px 0;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      .pdf-link {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 999px;
        background: #eff6ff;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>MathPQC Documents</h1>
        <p>This site serves as a simple landing page for the available MathPQC documents.</p>
      </section>

      <section class="card">
        <h2>Available documents</h2>
        <ul>
          <li>
            <a class="pdf-link" href="./MathPQC-%20AC26%20affiliated%20event.pdf" target="_blank" rel="noopener noreferrer">
              MathPQC - AC26 affiliated event
            </a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
